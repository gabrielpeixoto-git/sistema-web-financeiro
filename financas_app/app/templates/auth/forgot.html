{% extends "base.html" %}

{% block title %}Recuperar Senha | Finanças{% endblock %}

{% block header_title %}
<div>
  <h1 class="text-xl font-semibold text-text-primary">Recuperar Senha</h1>
  <p class="text-sm text-text-secondary">Enviaremos instruções para seu email</p>
</div>
{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-amber-500 to-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-amber-500/25">
        <i data-lucide="key" class="w-8 h-8 text-white"></i>
      </div>
      <h2 class="text-2xl font-bold text-text-primary">Esqueceu a senha?</h2>
      <p class="text-text-secondary mt-1">Não se preocupe, vamos ajudar</p>
    </div>

    <form class="card card-hover p-6 space-y-4" method="post" action="/auth/forgot">
      <label class="block text-sm">
        <div class="mb-1 text-text-secondary">Email</div>
        <input name="email" type="email" required placeholder="seu@email.com" />
      </label>

      <button type="submit" class="btn btn-primary w-full">
        <i data-lucide="send" class="w-4 h-4"></i>
        Enviar Instruções
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-text-secondary">
      <a href="/auth/login" class="text-accent-primary hover:underline flex items-center justify-center gap-1">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Voltar ao login
      </a>
    </div>
  </div>
{% endblock %}
